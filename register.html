<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Pro - Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p>Join FinTrack Pro</p>

      <form class="inp-form" id="register-form">

        <div class="form-group">
          <label for="Username">Choose a Username</label>
          <input required type="text" name="Username" id="register-username" />
        </div>

        <div class="form-group">
          <label for="Password">Password</label>
          <input required type="password" name="Password" id="register-password" />
        </div>

        <button id="registerBtn">Register</button>
      </form>

      <p>Already have an account? <a href="index.html">Login here</a></p>
    </div>

    <script>
        const registerForm = document.querySelector("#register-form");
        const form = document.querySelector("form");

        const registeredUsers = JSON.parse(localStorage.getItem("RegisteredUsers")) || [];

        form.addEventListener("submit", (event) => {
            event.preventDefault();

            let username = event.target[0].value;
            let password = event.target[1].value;

            if(username.trim()==="" || password.trim()===""){
                alert("Please fill all the fields!");
                return;
            }

            const userExists = registeredUsers.find((elem)=> elem.username === username);

            if(userExists){
                alert("Username already Exists, please pick another username!");
                return;
            }else{
                // Converting Extracted Credentials into Object format
                let user = {
                    id: Date.now(),
                    username,
                    password,
                };

                registeredUsers.push(user);
                localStorage.setItem("RegisteredUsers", JSON.stringify(registeredUsers));

                alert("Registration Successfull!");
                window.location.href = "index.html"
                form.reset();
                
            }
            
        });

        
    </script>
  </body>
</html>
